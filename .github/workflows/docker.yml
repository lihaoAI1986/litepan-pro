name: Build & Publish LitePan-Pro Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  IMAGE_NAME: litepan-pro
  # Docker 镜像名必须全小写，这里把 GitHub 用户名转为小写
  IMAGE_OWNER: ${{ lower(github.repository_owner) }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (branch / tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/litepan-pro:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ env.IMAGE_OWNER }}/litepan-pro:latest
          labels: |
            org.opencontainers.image.title=LitePan-Pro
            org.opencontainers.image.description=LitePan with TgtoDrive-style /d/ STRM 302 reverse proxy
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=PolyForm-Noncommercial-1.0.0
